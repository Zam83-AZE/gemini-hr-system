<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Holding HR Sistemi — Test Maketi (Tam Versiya)</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --sb:#0D1424;--sb-hover:#162035;--sb-active:#1a3a6b;
  --accent:#2563EB;--accent-l:#EFF6FF;--accent-d:#1d4ed8;
  --ok:#059669;--ok-l:#ECFDF5;
  --warn:#D97706;--warn-l:#FFFBEB;
  --err:#DC2626;--err-l:#FEF2F2;
  --bg:#F0F2F7;--card:#fff;--brd:#E4E7EC;
  --t1:#0F1728;--t2:#64748B;--t3:#94A3B8;
  --r:8px;--rl:12px;
}
body{font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;line-height:1.5;color:var(--t1);background:var(--bg);overflow:hidden;height:100vh}

/* LOGIN */
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--sb);overflow:auto}
.login-card{background:var(--card);border-radius:16px;padding:40px;width:400px}
.login-logo{width:48px;height:48px;background:var(--accent);border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;font-weight:700;margin:0 auto 20px}
.login-h{font-size:20px;font-weight:700;text-align:center;margin-bottom:6px}
.login-sub{font-size:13px;color:var(--t2);text-align:center;margin-bottom:28px}
.role-btn{width:100%;padding:12px 14px;margin-bottom:10px;border-radius:var(--r);border:1.5px solid var(--brd);background:var(--card);cursor:pointer;text-align:left;display:flex;align-items:center;gap:12px;transition:all .15s;font-family:inherit}
.role-btn:hover{border-color:var(--accent);background:var(--accent-l)}
.role-btn:last-child{margin-bottom:0}
.ri{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.rname{font-size:13px;font-weight:600;color:var(--t1);display:block}
.rdesc{font-size:11px;color:var(--t2);display:block;margin-top:2px}

/* APP SHELL */
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:218px;min-width:218px;background:var(--sb);display:flex;flex-direction:column;overflow:hidden}
.sb-top{padding:18px 14px 12px;border-bottom:1px solid rgba(255,255,255,.07)}
.sb-logo-row{display:flex;align-items:center;gap:10px}
.sb-mark{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700;flex-shrink:0}
.sb-logo-name{color:#fff;font-size:12px;font-weight:600}
.sb-logo-sub{color:rgba(255,255,255,.38);font-size:10px;margin-top:1px}
.sb-nav{flex:1;padding:10px 8px;overflow-y:auto}
.sb-sec{font-size:10px;color:rgba(255,255,255,.25);padding:12px 8px 5px;text-transform:uppercase;letter-spacing:.06em}
.sbi{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--r);cursor:pointer;color:rgba(255,255,255,.5);font-size:13px;font-weight:500;transition:all .14s;margin-bottom:2px}
.sbi:hover{background:var(--sb-hover);color:rgba(255,255,255,.82)}
.sbi.active{background:var(--sb-active);color:#fff}
.sbi svg{flex-shrink:0;opacity:.75}.sbi.active svg{opacity:1}
.sb-foot{padding:10px 8px;border-top:1px solid rgba(255,255,255,.07)}
.sb-user{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--r);cursor:pointer;transition:background .14s}
.sb-user:hover{background:var(--sb-hover)}
.sb-av{width:32px;height:32px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.sb-uname{color:#fff;font-size:12px;font-weight:500}
.sb-urole{color:rgba(255,255,255,.38);font-size:10px;margin-top:1px}
.sb-logout{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:var(--r);cursor:pointer;color:rgba(255,255,255,.4);font-size:12px;transition:all .14s;margin-top:4px}
.sb-logout:hover{background:rgba(220,38,38,.15);color:#fca5a5}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{height:52px;background:var(--card);border-bottom:1px solid var(--brd);display:flex;align-items:center;padding:0 24px;gap:12px;flex-shrink:0}
.topbar-title{font-size:15px;font-weight:700;flex:1;color:var(--t1)}
.content{flex:1;overflow-y:auto;padding:24px}

/* BUTTONS */
.btn{padding:8px 14px;border-radius:var(--r);border:none;cursor:pointer;font-size:13px;font-weight:500;display:inline-flex;align-items:center;gap:6px;transition:all .14s;font-family:inherit;white-space:nowrap}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent-d)}
.btn-secondary{background:var(--card);color:var(--t1);border:1px solid var(--brd)}.btn-secondary:hover{background:var(--bg)}
.btn-success{background:var(--ok);color:#fff}.btn-success:hover{background:#047857}
.btn-danger{background:var(--err);color:#fff}.btn-danger:hover{background:#b91c1c}
.btn-warn{background:var(--warn);color:#fff}.btn-warn:hover{background:#b45309}
.btn-ghost{background:transparent;color:var(--t2);border:1px solid transparent}.btn-ghost:hover{background:var(--bg);color:var(--t1)}
.btn-sm{padding:6px 11px;font-size:12px}
.btn-xs{padding:4px 9px;font-size:11px}

/* CARDS */
.card{background:var(--card);border-radius:var(--rl);border:1px solid var(--brd);padding:20px}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.stat-card{background:var(--card);border:1px solid var(--brd);border-radius:var(--rl);padding:16px 20px}
.stat-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.stat-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px}
.stat-num{font-size:28px;font-weight:700;line-height:1;margin-bottom:4px}
.stat-lbl{font-size:12px;color:var(--t2)}
.stat-delta{font-size:11px;margin-top:6px}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--brd);margin-bottom:20px;overflow-x:auto;scrollbar-width:thin;scrollbar-color:var(--accent) var(--bg)}
.tab-btn{padding:10px 16px;font-size:13px;font-weight:500;color:var(--t2);cursor:pointer;border-bottom:2px solid transparent;transition:all .14s;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit;white-space:nowrap;min-width:120px;text-align:center;flex-shrink:0}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}
.tab-btn:hover:not(.active){color:var(--t1)}
.tcnt{background:var(--bg);border-radius:20px;font-size:11px;padding:1px 7px;margin-left:6px;color:var(--t2);display:inline-block}
.tab-btn.active .tcnt{background:var(--accent-l);color:var(--accent)}

/* TABS SCROLL INDICATORS */
.tabs-wrapper{position:relative}
.tabs-wrapper::before,.tabs-wrapper::after{content:'';position:absolute;top:0;bottom:0;width:40px;z-index:10;pointer-events:none}
.tabs-wrapper::before{left:0;background:linear-gradient(to right,var(--card),transparent)}
.tabs-wrapper::after{right:0;background:linear-gradient(to left,var(--card),transparent)}

/* TOOLBAR */
.toolbar{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.search-w{position:relative;flex:1;min-width:180px}
.search-w input{width:100%;padding:8px 12px 8px 34px;border:1px solid var(--brd);border-radius:var(--r);font-size:13px;outline:none;background:var(--card);font-family:inherit;color:var(--t1);transition:border .14s}
.search-w input:focus{border-color:var(--accent)}
.si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--t3)}
select.filt{padding:8px 12px;border:1px solid var(--brd);border-radius:var(--r);font-size:13px;background:var(--card);outline:none;cursor:pointer;font-family:inherit;color:var(--t1);transition:border .14s}
select.filt:focus{border-color:var(--accent)}

/* TABLE */
.tbl-wrap{background:var(--card);border:1px solid var(--brd);border-radius:var(--rl);overflow:hidden}
table{width:100%;border-collapse:collapse}
th{padding:10px 16px;text-align:left;font-size:11px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--brd);background:#FAFBFC;white-space:nowrap}
td{padding:11px 16px;border-bottom:1px solid var(--brd);font-size:13px;color:var(--t1);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr.row-link{cursor:pointer;transition:background .1s}
tr.row-link:hover{background:#F8FAFF}
tr.selected{background:#EFF6FF}
.av-cell{display:flex;align-items:center;gap:10px}
.av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;color:#fff}

/* PILLS */
.pill{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.p-active{background:var(--ok-l);color:#065F46}
.p-candidate{background:#EFF6FF;color:#1E40AF}
.p-terminated{background:#F9FAFB;color:var(--t2);border:1px solid var(--brd)}
.p-rejected{background:#FEE2E2;color:#991B1B}
.p-ok{background:var(--ok-l);color:#065F46}
.p-part{background:var(--warn-l);color:#92400E}
.p-gap{background:var(--err-l);color:#991B1B}
.p-admin{background:#F5F3FF;color:#4C1D95}
.p-hr{background:#EFF6FF;color:#1E40AF}
.p-sub{background:var(--ok-l);color:#065F46}
.p-holding{background:#FEF3C7;color:#92400E}

/* MODAL */
.backdrop{position:fixed;inset:0;background:rgba(10,15,30,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;overflow-y:auto}
.modal-box{background:var(--card);border-radius:var(--rl);width:100%;max-height:90vh;overflow-y:auto;position:relative;animation:mfade .18s ease;display:flex;flex-direction:column}
@keyframes mfade{from{opacity:0;transform:translateY(8px)}}
.modal-sm{max-width:440px}.modal-md{max-width:600px;min-width:600px}.modal-lg{max-width:95%;min-width:95%}.modal-xl{max-width:1200px;min-width:1200px}
.modal-box .mbody{flex:1;overflow-y:auto}
.mh{display:flex;align-items:center;justify-content:space-between;padding:18px 24px;border-bottom:1px solid var(--brd);position:sticky;top:0;background:var(--card);z-index:1}
.mh-title{font-size:15px;font-weight:700}
.mclose{width:28px;height:28px;border-radius:6px;background:var(--bg);border:none;cursor:pointer;font-size:18px;color:var(--t2);display:flex;align-items:center;justify-content:center;line-height:1}
.mclose:hover{background:var(--brd);color:var(--t1)}
.mbody{padding:24px;min-height:600px}
.mfooter{padding:14px 24px;border-top:1px solid var(--brd);display:flex;justify-content:flex-end;gap:10px;position:sticky;bottom:0;background:var(--card)}

/* CARD TAB CONTENT - consistent height */
.ig{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-bottom:20px;min-height:180px}
.tab-content-wrapper{min-height:650px}

/* FORMS */
.fg{margin-bottom:16px}
.flbl{display:block;font-size:11px;font-weight:600;color:var(--t2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
.finput,.fselect,.ftextarea{width:100%;padding:9px 12px;border:1px solid var(--brd);border-radius:var(--r);font-size:13px;outline:none;font-family:inherit;color:var(--t1);background:var(--card);transition:border .14s}
.finput:focus,.fselect:focus,.ftextarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.07)}
.ftextarea{resize:vertical;min-height:80px}
.fhint{font-size:11px;color:var(--t3);margin-top:4px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.frow3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}

/* FILE UPLOAD */
.file-upload{border:2px dashed var(--brd);border-radius:var(--r);padding:20px;text-align:center;cursor:pointer;transition:all .14s}
.file-upload:hover{border-color:var(--accent);background:var(--accent-l)}
.file-upload input[type=file]{display:none}
.fu-icon{font-size:32px;margin-bottom:8px}
.fu-text{font-size:12px;color:var(--t2)}
.file-preview{display:flex;align-items:center;gap:10px;padding:10px;background:var(--bg);border-radius:var(--r);margin-top:10px}
.file-preview img{width:40px;height:40px;border-radius:6px;object-fit:cover}
.file-name{font-size:12px;color:var(--t1);flex:1}
.file-remove{color:var(--err);cursor:pointer;font-size:16px}

/* EMPLOYEE CARD */
.ec-header{display:flex;gap:20px;align-items:flex-start;padding:24px;border-bottom:1px solid var(--brd)}
.ec-photo{width:72px;height:72px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:700;color:#fff;flex-shrink:0;position:relative}
.ec-photo-edit{position:absolute;bottom:-5px;right:-5px;width:24px;height:24px;border-radius:50%;background:var(--accent);border:2px solid #fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px}
.ec-name{font-size:18px;font-weight:700;margin-bottom:3px}
.ec-pos{font-size:13px;color:var(--t2);margin-bottom:10px}

/* Info grid */
.ig{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-bottom:20px}
.ig-item .il{font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px}
.ig-item .iv{font-size:13px;color:var(--t1);font-weight:500}
.ig-item .iv.empty{color:var(--t3);font-style:italic;font-weight:400}

/* FORM VIEW - Label + Value style */
.fv-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.fv-item{background:var(--bg);border-radius:var(--r);padding:12px 14px}
.fv-label{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.fv-value{font-size:13px;color:var(--t1);font-weight:500;line-height:1.4}
.fv-value.empty{color:var(--t3);font-style:italic}
.fv-value.monospace{font-family:monospace;font-size:12px}
.fv-pill{display:inline-block;padding:4px 10px;border-radius:12px;font-size:11px;font-weight:600}
.fv-pill-ok{background:var(--ok-l);color:var(--ok)}
.fv-pill-no{background:var(--err-l);color:var(--err)}
.fv-section{margin-bottom:24px}
.fv-section-title{font-size:13px;font-weight:700;color:var(--t1);margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--accent)}

/* Timeline */
.tl-item{display:flex;gap:14px;padding:13px 0;border-bottom:1px solid var(--brd)}
.tl-item:last-child{border-bottom:none}
.tl-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px}
.tl-title{font-size:13px;font-weight:600;margin-bottom:2px}
.tl-sub{font-size:12px;color:var(--t2)}
.tl-date{font-size:11px;color:var(--t3);margin-top:4px}
.tl-field{font-size:11px;color:var(--t3);font-style:italic}

/* List items */
.li-item{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--brd)}
.li-item:last-child{border-bottom:none}
.li-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}

/* Section headers */
.sec-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sec-title{font-size:14px;font-weight:700}

/* Two column grid */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}

/* Struct item */
.str-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-radius:var(--r);transition:background .12s}
.str-item:hover{background:var(--bg)}
.str-name{font-size:13px;font-weight:500}
.str-sub{font-size:11px;color:var(--t2);margin-top:2px}

/* ORG TREE VIEW */
.org-tree{padding:0;margin:0}
.org-node{margin:0;padding:0}
.org-row{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:var(--r);transition:all .15s;margin-bottom:4px;cursor:pointer}
.org-row:hover{background:var(--bg)}
.org-row.parent-node{background:var(--accent-l);border:1px solid var(--accent)}
.org-toggle{width:20px;height:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;color:var(--t3);border-radius:4px;transition:all .14s;flex-shrink:0}
.org-toggle:hover{background:var(--brd);color:var(--t1)}
.org-icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.org-info{flex:1;min-width:0}
.org-name{font-size:13px;font-weight:600;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.org-meta{font-size:11px;color:var(--t2);margin-top:2px;display:flex;gap:8px;flex-wrap:wrap}
.org-actions{display:flex;gap:4px;opacity:0;transition:opacity .14s}
.org-row:hover .org-actions{opacity:1}
.org-children{margin-left:28px;border-left:2px solid var(--brd);padding-left:12px}
.industry-badge{font-size:9px;padding:2px 6px;border-radius:4px;font-weight:600;text-transform:uppercase;background:var(--bg);color:var(--t1);border:1px solid var(--brd)}

/* Dashboard recent */
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.act-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--brd)}
.act-item:last-child{border-bottom:none}
.act-ic{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}

/* Empty state */
.empty-s{text-align:center;padding:48px 24px}
.empty-s .ei{font-size:36px;margin-bottom:12px}
.empty-s h3{font-size:14px;font-weight:600;color:var(--t1);margin-bottom:6px}
.empty-s p{font-size:12px;color:var(--t2)}

/* GAP banner */
.gap-note{background:var(--err-l);border:1px solid #FECACA;border-radius:var(--r);padding:10px 14px;font-size:12px;color:#991B1B;display:flex;align-items:center;gap:8px;margin-bottom:14px}
.gap-note.ok{background:var(--ok-l);border-color:#A7F3D0;color:#065F46}

/* CHARTS */
.chart-container{background:var(--card);border:1px solid var(--brd);border-radius:var(--rl);padding:16px;margin-bottom:16px}
.chart-title{font-size:13px;font-weight:600;margin-bottom:12px;color:var(--t1)}
.bar-chart{display:flex;align-items:flex-end;gap:8px;height:150px;padding:10px 0}
.bar-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bar{width:100%;border-radius:4px 4px 0 0;transition:height .3s ease}
.bar-label{font-size:10px;color:var(--t3);text-align:center}
.bar-value{font-size:10px;font-weight:600;color:var(--t1)}

/* FUNKSIONAL PANEL */
.funk-panel{position:fixed;right:0;top:0;bottom:0;width:320px;background:var(--card);border-left:1px solid var(--brd);z-index:150;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .22s cubic-bezier(.4,0,.2,1);box-shadow:-8px 0 24px rgba(0,0,0,.08)}
.funk-panel.open{transform:translateX(0)}
.funk-hd{padding:15px 18px;border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:var(--bg)}
.funk-hd h3{font-size:13px;font-weight:700;color:var(--t1)}
.funk-ctx{font-size:10px;color:var(--t2);font-weight:400;margin-top:2px}
.funk-body{flex:1;overflow-y:auto;padding:14px 18px}
.funk-sec{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin:12px 0 8px;padding-bottom:5px;border-bottom:1px solid var(--brd)}
.funk-item{display:flex;align-items:flex-start;gap:9px;padding:8px 0;border-bottom:1px solid rgba(0,0,0,.04)}
.funk-item:last-child{border-bottom:none}
.fi-status{width:16px;height:16px;border-radius:50%;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:8px;color:#fff;font-weight:700}
.fi-ok{background:var(--ok)}.fi-part{background:var(--warn)}.fi-gap{background:var(--err)}
.fi-title{font-size:12px;font-weight:500;color:var(--t1);line-height:1.4}
.fi-note{font-size:11px;color:var(--t2);margin-top:2px;line-height:1.4}

.funk-toggle-btn{position:fixed;bottom:24px;right:24px;z-index:140;padding:9px 16px;background:var(--sb);color:#fff;border:none;border-radius:24px;cursor:pointer;font-size:12px;font-weight:600;display:flex;align-items:center;gap:7px;box-shadow:0 4px 14px rgba(0,0,0,.22);transition:all .15s;font-family:inherit}
.funk-toggle-btn:hover{background:#1a3a6b;transform:translateY(-1px)}
.funk-toggle-btn.active-btn{background:var(--accent)}

/* BULK ACTIONS BAR */
.bulk-bar{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--sb);color:#fff;padding:12px 20px;border-radius:24px;display:flex;align-items:center;gap:12px;box-shadow:0 8px 24px rgba(0,0,0,.24);z-index:130;transition:transform .2s}
.bulk-bar.visible{transform:translateX(-50%) translateY(0)}
.bulk-count{font-size:13px;font-weight:600}
.bulk-actions{display:flex;gap:8px}
.bulk-btn{padding:6px 12px;border-radius:16px;border:none;cursor:pointer;font-size:11px;font-weight:500;color:#fff;transition:all .14s}
.bulk-btn-sec{background:rgba(255,255,255,.2)}.bulk-btn-sec:hover{background:rgba(255,255,255,.3)}
.bulk-btn-danger{background:var(--err)}.bulk-btn-danger:hover{background:#b91c1c}
.bulk-close{margin-left:8px;cursor:pointer;opacity:.7;font-size:16px}

/* HIERARCHY TREE */
.tree-item{padding:8px 12px;border-left:2px solid var(--brd);margin-left:12px}
.tree-item.has-children{border-left-color:var(--accent)}
.tree-header{display:flex;align-items:center;gap:8px;cursor:pointer}
.tree-toggle{width:16px;height:16px;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--t3);cursor:pointer}
.tree-children{margin-left:16px}

.audit-table td{padding:10px 12px;font-size:11px}

.audit-old{text-decoration:line-through;color:var(--t3);margin-right:8px}
.audit-new{color:var(--ok);font-weight:600}

/* ORG TREE HELPERS */
const industryIcons={HOLDING:'👑',CONSTRUCTION:'🏗️',LOGISTICS:'🚛',HOTEL:'🏨',RESTAURANT_CHAIN:'🍽️',RESTAURANT:'🔴',AGRICULTURE:'🌾',PRODUCTION:'🔥',SPORTS:'🥋'};
function getIndustryIcon(ind){return industryIcons[ind]||'🏢';}
function getChildren(pid){return DB.companies.filter(c=>c.parent_id===pid);}
function hasChildren(pid){return getChildren(pid).length>0;}

// Tree state for expanded/collapsed nodes
if(!window.treeState) window.treeState={expanded:[1,5]};
function toggleTree(id){
  const c=DB.companies.find(x=>x.id===id);
  if(c&&c.is_holding) return;
  const idx=window.treeState.expanded.indexOf(id);
  if(idx>=0) window.treeState.expanded.splice(idx,1);
  else window.treeState.expanded.push(id);
  renderContent();
}
function isExpanded(id){return window.treeState.expanded.includes(id);}

function renderOrgNode(cid,depth=0){
  const c=DB.companies.find(x=>x.id===cid);
  if(!c) return '';
  const children=getChildren(cid);
  const hasKids=children.length>0;
  const expanded=isExpanded(cid);
  const icon=getIndustryIcon(c.industry);
  const clickAttr = hasKids ? ` onclick="toggleTree(${c.id})"` : '';
  const parentClass = hasKids&&expanded ? ' parent-node' : '';

  const actions=`
    <div class="org-actions" onclick="event.stopPropagation()">
      <button class="btn btn-ghost btn-xs" onclick="event.stopPropagation();openEditCompanyModal(${c.id})">✎</button>
      ${!c.is_holding?`<button class="btn btn-ghost btn-xs text-err" onclick="event.stopPropagation();deleteCompany(${c.id})">🗑</button>`:''}
      <button class="btn btn-ghost btn-xs" onclick="event.stopPropagation();openAddSubCompanyModal(${c.id})">➕</button>
    </div>
  `;

  return `
    <div class="org-node">
      <div class="org-row${parentClass}"${clickAttr}>
        ${hasKids?`<div class="org-toggle" onclick="event.stopPropagation();toggleTree(${c.id})">${expanded?'▼':'▶'}</div>`:'<div style="width:20px"></div>'}
        <div class="org-icon" style="background:var(--bg);border:1px solid var(--brd)">${icon}</div>
        <div class="org-info">
          <div class="org-name">${c.name} ${c.is_holding?'<span class="industry-badge">HOLDING</span>':`<span class="industry-badge">${c.industry.replace('_',' ')}</span>`}</div>
          <div class="org-meta">
            <span>🔖 ${c.tax_id}</span>
            ${c.address?`<span>📍 ${c.address}</span>`:''}
            ${hasKids?`<span>📁 ${children.length} alt şirkət</span>`:''}
          </div>
        </div>
        ${actions}
      </div>
      ${hasKids&&expanded?`<div class="org-children">${children.map(child=>renderOrgNode(child.id,depth+1)).join('')}</div>`:''}
    </div>
  `;
}

/* ===== FILE UPLOAD HELPERS ===== */
function handleFileSelect(event, callback){
  const file = event.target.files[0];
  if(file){
    const reader = new FileReader();
    reader.onload = function(e){
      callback({name:file.name,size:file.size,type:file.type,data:e.target.result});
    };
    reader.readAsDataURL(file);
  }
}

function renderFilePreview(fileData, onRemove){
  if(!fileData) return '';
  const isImage = fileData.type.startsWith('image/');
  return `
    <div class="file-preview">
      ${isImage ? `<img src="${fileData.data}" alt="${fileData.name}">` : '📄'}
      <span class="file-name">${fileData.name} (${(fileData.size/1024).toFixed(1)} KB)</span>
      <span class="file-remove" onclick="${onRemove}">×</span>
    </div>
  `;
}

  // Filter lifecycle by selected month

  const recent = DB.lifecycle.filter(l=>{
    const emp = DB.employees.find(x=>x.id===l.eid);

    return true;

  const monthTransferred = DB.lifecycle.filter(l=>{
    const emp = DB.employees.find(x=>x.id===l.eid);

    return l.old==='TRANSFER' && l.date && l.date.startsWith(selectedMonth);

  const actIcons={ACTIVE:'✅',CANDIDATE:'📋',TERMINATED:'🚪'};

  const currentYear = new Date().getFullYear();

  for(let m=1; m<=12; m++){
    const monthStr = `${currentYear}-${String(m).padStart(2,'0')}`;

    monthOptions.push(`<option value="${monthStr}" ${monthStr===selectedMonth?'selected':''}>${monthName}</option>`);
  }
  
  return `
    ${companyHeader}
    
    <!-- Compact Monthly Stats -->
    <div style="display:flex;gap:12px;align-items:center;margin-bottom:16px;flex-wrap:wrap">
      <div style="display:flex;gap:8px">
        <div class="stat-card" style="padding:10px 14px;min-width:100px">
          <div class="stat-lbl" style="font-size:10px">İşə qəbul</div>
          <div class="stat-num text-ok" style="font-size:20px">${monthHired}</div>
        </div>
        <div class="stat-card" style="padding:10px 14px;min-width:100px">
          <div class="stat-lbl" style="font-size:10px">Xitam</div>
          <div class="stat-num text-err" style="font-size:20px">${monthTerminated}</div>
        </div>
        <div class="stat-card" style="padding:10px 14px;min-width:100px">

        </div>

      <select class="filt" onchange="S.dashboardMonth=this.value;renderDashboard()" style="margin-left:auto">

        <div class="stat-lbl" style="font-size:10px">Aktiv</div>
        <div class="stat-num text-ok">${active}</div>

        ${isAdmin()?'<button class="btn btn-primary btn-sm" onclick="setView(&apos;settings&apos;)">⚙️ Ayarlar</button>':''}
      </div>
    </div>`;
}

/* ===== EMPLOYEES ===== */
let selectedEmployees = new Set();

function toggleEmpSelection(eid, event){
  event.stopPropagation();
  if(selectedEmployees.has(eid)) selectedEmployees.delete(eid);
  else selectedEmployees.add(eid);
  updateBulkBar();
  renderEmployees();
}

function updateBulkBar(){
  const bar = document.getElementById('bulk-bar');
  document.getElementById('bulk-count').textContent = `${selectedEmployees.size} seçilib`;
  if(selectedEmployees.size>0) bar.classList.add('visible');
  else bar.classList.remove('visible');
}

function clearBulkSelection(){
  selectedEmployees.clear();
  updateBulkBar();
  renderEmployees();
}

function bulkExport(){
  const emps = DB.employees.filter(e=>selectedEmployees.has(e.id));
  exportEmployeesToCSV(emps);
}

function bulkTerminate(){
  if(!confirm('Seçilmiş işçilərə xitam vermək istədiyinizə əminsiniz?')) return;
  selectedEmployees.forEach(eid=>{
    const e = DB.employees.find(x=>x.id===eid);
    if(e&&e.status==='ACTIVE'){
      e.status='TERMINATED';
      e.term_date = new Date().toISOString().split('T')[0];
      e.term_reason = 'Toplu xitam';
      DB.lifecycle.push({eid,uid:S.uid,old:'ACTIVE',new_s:'TERMINATED',desc:'Toplu xitam verildi',date:new Date().toISOString().split('T')[0]});
      logAudit(eid,'status','ACTIVE','TERMINATED','Toplu xitam');
    }
  });
  clearBulkSelection();
  renderAll();
}

function exportToCSV(){
  const emps = getEmps().filter(e=>e.status===S.tab);
  exportEmployeesToCSV(emps);
}

function exportEmployeesToCSV(emps){
  const headers = ['ID','Ad','Soyad','FİN','Status','Vəzifə','Departament','Şirkət','Maaş','Telefon','Email'];
  const rows = emps.map(e=>{
    const dept = de(e.did);
    const pos = po(e.pid);
    const comp = co(e.cid);
    return [e.id,e.fn,e.ln,e.fin,e.status,pos?.name||'',dept?.name||'',comp?.name||'',e.salary||'',e.phone||'',e.email||''].map(v=>`"${v}"`).join(',');
  });
  const csv = [headers.join(','),...rows].join('\n');
  const blob = new Blob([csv],{type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `employees_${new Date().toISOString().split('T')[0]}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

function renderEmployees(){
  const emps = getEmps().filter(e=>{
    if(e.status!==S.tab && e.status!=='REJECTED') return false;
    if(S.tab==='CANDIDATE' && e.status==='REJECTED') return false;
    if(S.search){
      const q=S.search.toLowerCase();
      if(!(e.fn+' '+e.ln).toLowerCase().includes(q)&&!e.fin.toLowerCase().includes(q)) return false;
    }
    if(S.dept_filter&&e.did!==parseInt(S.dept_filter)) return false;
    return true;
  });
  const allEmps = getEmps();
  const cnt={
    ACTIVE:allEmps.filter(e=>e.status==='ACTIVE').length,
    CANDIDATE:allEmps.filter(e=>e.status==='CANDIDATE').length,
    TERMINATED:allEmps.filter(e=>e.status==='TERMINATED').length,
    REJECTED:allEmps.filter(e=>e.status==='REJECTED').length
  };

  const myDepts = S.dept_filter || S.cid_filter ?
    DB.departments.filter(d=>d.cid===(S.cid_filter||myCid())) :
    (isHolding()||isAdmin()) ? DB.departments : DB.departments.filter(d=>d.cid===myCid());

  const companyFilter = (isHolding()||isAdmin()) ? `
    <select class="filt" onchange="S.cid_filter=this.value?parseInt(this.value):null;renderContent()">
      <option value="">Bütün şirkətlər</option>
      ${DB.companies.filter(c=>!c.is_holding).map(c=>`<option value="${c.id}" ${S.cid_filter===c.id?'selected':''}>${c.name}</option>`).join('')}
    </select>` : '';

  // Group by company for ACTIVE tab
  const showGrouping = S.tab==='ACTIVE' && (isHolding()||isAdmin());
  
  let rows = '';
  if(showGrouping){
    // Grouped view
    const companies = DB.companies.filter(c=>!c.is_holding);
    rows = companies.map(comp=>{
      const compEmps = emps.filter(e=>e.cid===comp.id);
      if(compEmps.length===0) return '';
      const empRows = compEmps.map(e=>{
        const dept = de(e.did);
        const pos = po(e.pid);
        const isSelected = selectedEmployees.has(e.id);
        return `<tr class="row-link ${isSelected?'selected':''}" onclick="openCard(${e.id})">
          <td style="width:40px"><input type="checkbox" ${isSelected?'checked':''} onclick="toggleEmpSelection(${e.id},event)"></td>
          <td><div class="av-cell"><div class="av" style="background:${avColor(e)}">${initials(e)}</div><div><div class="fw6">${e.fn} ${e.ln}</div><div class="xsmall muted">${e.fin}</div></div></div></td>
          <td>${pos?.name||'<span class="muted">—</span>'}</td>
          <td>${dept?.name||'<span class="muted">—</span>'}</td>
          <td>${e.hire?fmtDate(e.hire):'<span class="muted">—</span>'}</td>
          <td>${statusPill(e.status)}</td>
        </tr>`;
      }).join('');
      return `
        <thead>
          <tr style="background:var(--accent-l)">
            <th colspan="7" style="background:var(--accent-l);border-bottom:2px solid var(--accent)">
              🏢 ${comp.name} <span class="tcnt">${compEmps.length}</span>
            </th>
          </tr>
        </thead>
        <tbody>${empRows}</tbody>
      `;
    }).join('');
  } else {
    // Regular view
    rows = emps.length ? emps.map(e=>{
      const dept = de(e.did);
      const pos = po(e.pid);
      const comp = co(e.cid);
      const isSelected = selectedEmployees.has(e.id);
      return `<tr class="row-link ${isSelected?'selected':''}" onclick="openCard(${e.id})">
        <td style="width:40px"><input type="checkbox" ${isSelected?'checked':''} onclick="toggleEmpSelection(${e.id},event)"></td>
        <td><div class="av-cell"><div class="av" style="background:${avColor(e)}">${initials(e)}</div><div><div class="fw6">${e.fn} ${e.ln}</div><div class="xsmall muted">${e.fin}</div></div></div></td>
        ${isHolding()||isAdmin()?`<td class="xsmall muted">${comp?.name||'—'}</td>`:''}
        <td>${pos?.name||'<span class="muted">—</span>'}</td>
        <td>${dept?.name||'<span class="muted">—</span>'}</td>
        <td>${e.hire?fmtDate(e.hire):'<span class="muted">—</span>'}</td>
        <td>${statusPill(e.status)}</td>
      </tr>`;
    }).join('') : `<tr><td colspan="10"><div class="empty-s"><div class="ei">🔍</div><h3>Nəticə yoxdur</h3><p>Axtarış şərtlərinə uyğun işçi tapılmadı</p></div></td></tr>`;
  }

  return `
    <div class="tabs">
      <button class="tab-btn ${S.tab==='ACTIVE'?'active':''}" onclick="S.tab='ACTIVE';renderContent()">Cari Əməkdaşlar<span class="tcnt">${cnt.ACTIVE}</span></button>
      <button class="tab-btn ${S.tab==='CANDIDATE'?'active':''}" onclick="S.tab='CANDIDATE';renderContent()">Yeni Namizədlər<span class="tcnt">${cnt.CANDIDATE}</span></button>
      <button class="tab-btn ${S.tab==='TERMINATED'?'active':''}" onclick="S.tab='TERMINATED';renderContent()">İşdən Çıxanlar<span class="tcnt">${cnt.TERMINATED}</span></button>
    </div>
    <div class="toolbar">
      <div class="search-w">
        <svg class="si" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" placeholder="FİN, ad və ya soyad..." value="${S.search}" oninput="S.search=this.value;renderContent()">

      <select class="filt" onchange="S.dept_filter=this.value;renderContent()">
        <option value="">Bütün departamentlər</option>
        ${myDepts.map(d=>`<option value="${d.id}" ${S.dept_filter==d.id?'selected':''}>${d.name}</option>`).join('')}
      </select>
      ${companyFilter}
      <button class="btn btn-secondary btn-sm" onclick="exportToCSV()">📥 Export CSV</button>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead><tr>
          <th style="width:40px"><input type="checkbox" onchange="selectAllEmployees(this)"></th>
          <th>Ad Soyad / FİN</th>
          ${!showGrouping && (isHolding()||isAdmin())?'<th>Şirkət</th>':''}
          <th>Vəzifə</th><th>Departament</th><th>İşə qəbul tarixi</th><th>Status</th>
        </tr></thead>
        ${showGrouping?'':`<tbody>`}${rows}${showGrouping?'':'</tbody>'}
      </table>
    </div>`;
}

function selectAllEmployees(checkbox){
  const emps = getEmps().filter(e=>e.status===S.tab);
  if(checkbox.checked){
    emps.forEach(e=>selectedEmployees.add(e.id));
  } else {
    emps.forEach(e=>selectedEmployees.delete(e.id));
  }
  updateBulkBar();
  renderEmployees();
}

  const rows = logs.map(l=>{
    const e = DB.employees.find(x=>x.id===l.eid);
    const u = DB.users.find(x=>x.id===l.uid);
    return `<tr>
      <td>${fmtDate(l.date)}</td>
      <td>${e?`${e.fn} ${e.ln}`:'Sistem'}</td>
      <td><span class="audit-change">${l.field}</span></td>
      <td><span class="audit-old">${l.old_value||'—'}</span> → <span class="audit-new">${l.new_value||'—'}</span></td>
      <td class="muted">${l.desc}</td>
      <td class="muted">${u?.name||'Sistem'}</td>
    </tr>`;
  }).join('');

  return `
    <div class="card">
      <div class="sec-h">
        <div class="sec-title">Sistem Audit Loqu</div>
        <button class="btn btn-secondary btn-sm" onclick="exportAuditLog()">📥 Export CSV</button>
      </div>
      <div class="gap-note ok mt3">✓ Bütün sahə dəyişiklikləri tarixçəsi qeydə alınır</div>
      <div class="tbl-wrap mt3">
        <table class="audit-table">
          <thead><tr><th>Tarix</th><th>İşçi</th><th>Sahə</th><th>Dəyişiklik</th><th>Təsvir</th><th>İstifadəçi</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
}

function exportAuditLog(){
  const headers = ['Tarix','İşçi','Sahə','Köhnə','Yeni','Təsvir','İstifadəçi'];
  const rows = DB.auditLog.map(l=>{
    const e = DB.employees.find(x=>x.id===l.eid);
    const u = DB.users.find(x=>x.id===l.uid);
    return [l.date,e?`${e.fn} ${e.ln}`:'Sistem',l.field,l.old_value||'',l.new_value||'',l.desc,u?.name||''].map(v=>`"${v}"`).join(',');
  });
  const csv = [headers.join(','),...rows].join('\n');
  const blob = new Blob([csv],{type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `audit_log_${new Date().toISOString().split('T')[0]}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

  if(S.etab==='personal') return renderPersonalTab(e);

  if(S.etab==='driver') return renderDriverTab(e);
  if(S.etab==='bank') return renderBankTab(e);

  if(S.etab==='medical') return renderMedicalTab(e);

function doEditPersonal(eid){
  const e=DB.employees.find(x=>x.id===eid);
  const fn=document.getElementById('ep-fn').value.trim();
  const ln=document.getElementById('ep-ln').value.trim();
  const fan=document.getElementById('ep-fan').value.trim();
  const bd=document.getElementById('ep-bd').value;
  const gender=document.getElementById('ep-gender').value;
  const phone=document.getElementById('ep-phone').value.trim();
  const email=document.getElementById('ep-email').value.trim();
  const addr=document.getElementById('ep-addr').value.trim();
  
  if(!fn||!ln){alert('Ad və soyad mütləqdir!');return;}
  
  if(e.fn!==fn) logAudit(eid,'fn',e.fn,fn,'Ad dəyişdirildi');
  if(e.ln!==ln) logAudit(eid,'ln',e.ln,ln,'Soyad dəyişdirildi');
  if(e.fan!==fan) logAudit(eid,'fan',e.fan,fan,'Ata adı dəyişdirildi');
  if(e.bd!==bd) logAudit(eid,'bd',e.bd,bd,'Doğum tarixi dəyişdirildi');
  if(e.gender!==gender) logAudit(eid,'gender',e.gender,gender,'Cins dəyişdirildi');
  if(e.phone!==phone) logAudit(eid,'phone',e.phone,phone,'Telefon dəyişdirildi');
  if(e.email!==email) logAudit(eid,'email',e.email,email,'Email dəyişdirildi');
  if(e.addr!==addr) logAudit(eid,'addr',e.addr,addr,'Ünvan dəyişdirildi');
  
  e.fn=fn;e.ln=ln;e.fan=fan;e.bd=bd;e.gender=gender;e.phone=phone;e.email=email;e.addr=addr;
  closeEditModal();
  renderCard();
  renderAll();
}

function renderExperienceTab(e){
  const exps = DB.experience.filter(x=>x.eid===e.id);
  const rows = exps.map(ex=>`<div class="tl-item">
    <div class="tl-dot" style="background:var(--accent)"></div>
    <div style="flex:1">
      <div class="tl-title">${ex.company}</div>
      <div class="tl-sub">${ex.pos}</div>
      <div class="tl-date">${fmtDate(ex.sd)} – ${ex.ed?fmtDate(ex.ed):'İndiyə qədər'} · ${ex.reason?'Çıxma səbəbi: '+ex.reason:''}</div>
    </div>
    <button class="btn btn-ghost btn-xs" onclick="openEditExpModal(${ex.id})">✎</button>
  </div>`).join('');
  return `
    <div class="tab-content-wrapper">
    ${(()=>{
      const exps=DB.experience.filter(x=>x.eid===e.id);
      if(!exps.length) return '';
      let totalMonths=0,holdingMonths=0,prevMonths=0;
      const hireDate=e.hire?new Date(e.hire):null;
      exps.forEach(ex=>{
        const sd=new Date(ex.sd);
        const ed=ex.ed?new Date(ex.ed):new Date();
        const m=(ed.getFullYear()-sd.getFullYear())*12+(ed.getMonth()-sd.getMonth());
        totalMonths+=m;
        if(hireDate && sd>=hireDate) holdingMonths+=m;
        else prevMonths+=m;
      });
      const fmt=m=>{const y=Math.floor(m/12);const r=m%12;return y+' il '+(r?r+' ay':'');};
      return `<div class="card mb4" style="border-left:4px solid var(--accent)">
        <div class="grid3">
          <div style="text-align:center"><div style="font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px">Ümumi staj</div><div style="font-size:22px;font-weight:700;color:var(--accent)">${fmt(totalMonths)}</div></div>
          <div style="text-align:center"><div style="font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px">Holdinqdə</div><div style="font-size:22px;font-weight:700;color:var(--ok)">${fmt(holdingMonths)}</div></div>
          <div style="text-align:center"><div style="font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px">Əvvəlki müəssisələrdə</div><div style="font-size:22px;font-weight:700;color:var(--t2)">${fmt(prevMonths)}</div></div>
        </div>
      </div>`;
    })()}
    <div class="sec-h"><div class="sec-title">İş təcrübəsi</div><button class="btn btn-primary btn-sm" onclick="openAddExpModal(${e.id})">+ Əlavə et</button></div>
    ${rows||`<div class="empty-s"><div class="ei">💼</div><h3>Təcrübə qeydləri yoxdur</h3></div>`}
    <div class="gap-note mt4 ok">✓ İş sertifikatı yükləmə funksiyası planlaşdırılır</div>
    </div>`;
}

function uploadContractFile(eid,input){
  const file = input.files[0];
  if(!file){return;}
  if(file.size > 10*1024*1024){alert('Fayl 10MB-dan böyük ola bilməz!');return;}
  
  const reader = new FileReader();
  reader.onload = function(e){
    const emp = DB.employees.find(x=>x.id===eid);
    emp.contract_file = {name:file.name,size:file.size,data:e.target.result};
    renderCard();
  };
  reader.readAsDataURL(file);
}

function removeContractFile(eid){
  const emp = DB.employees.find(x=>x.id===eid);
  if(emp && confirm('Müqavilə faylını silmək istədiyinizə əminsiniz?')){
    emp.contract_file = null;
    renderCard();
  }
}

function doTransfer(eid){
  const e=DB.employees.find(x=>x.id===eid);
  const cid=parseInt(document.getElementById('trans-cid').value);
  const pid=parseInt(document.getElementById('trans-pid').value);
  const did=parseInt(document.getElementById('trans-did').value);
  const date=document.getElementById('trans-date').value;
  
  if(!date){alert('Tarix mütləqdir!');return;}
  
  const oldCid=e.cid;
  const oldPid=e.pid;
  const oldDid=e.did;
  
  e.cid=cid;e.pid=pid;e.did=did;
  
  logAudit(eid,'cid',co(oldCid)?.name,co(cid)?.name,'Şirkət dəyişdirildi (transfer)');
  logAudit(eid,'pid',po(oldPid)?.name,po(pid)?.name,'Vəzifə dəyişdirildi (transfer)');
  logAudit(eid,'did',de(oldDid)?.name,de(did)?.name,'Departament dəyişdirildi (transfer)');
  
  DB.lifecycle.push({eid,uid:S.uid,old:'TRANSFER',new_s:'ACTIVE',desc:`Transfer: ${co(oldCid)?.name} → ${co(cid)?.name}`,date});

  document.getElementById('modals').innerHTML='';
  renderAll();
  openCard(eid,'corporate');
}

let tempCVFile = null;
function handleCVSelect(input){
  const file = input.files[0];
  if(!file){return;}
  if(file.size > 5*1024*1024){alert('Fayl 5MB-dan böyük ola bilməz!');return;}
  tempCVFile = {name:file.name,size:file.size};
  document.getElementById('cv-preview').innerHTML = `<div class="file-preview"><span class="fu-icon">📄</span><span class="file-name">${file.name} (${(file.size/1024/1024).toFixed(2)} MB)</span></div>`;
}

function fillFromTerminated(){
  const termId = parseInt(document.getElementById('ne-terminated').value);
  if(!termId){return;}
  const termEmp = DB.employees.find(e=>e.id===termId);
  if(termEmp){
    document.getElementById('ne-fn').value = termEmp.fn;
    document.getElementById('ne-ln').value = termEmp.ln;
    document.getElementById('ne-fan').value = termEmp.fan||'';
    document.getElementById('ne-bd').value = termEmp.bd||'';
    document.getElementById('ne-gender').value = termEmp.gender||'';
    document.getElementById('ne-phone').value = termEmp.phone||'';
    document.getElementById('ne-email').value = termEmp.email||'';
  }
}

function closeNewEmpModal(){document.getElementById('modals').innerHTML='';tempCVFile=null;}
function doCreateEmp(){
  const fn=document.getElementById('ne-fn').value.trim();
  const ln=document.getElementById('ne-ln').value.trim();
  const fin=document.getElementById('ne-fin').value.trim().toUpperCase();
  const cid=parseInt(document.getElementById('ne-cid').value);
  if(!fn||!ln||fin.length!==7){alert('Ad, soyad və 7 simvollu FİN mütləqdir!');return;}
  if(DB.employees.find(e=>e.fin===fin)){alert('Bu FİN kodu artıq mövcuddur!');return;}
  const newId=Math.max(...DB.employees.map(e=>e.id))+1;
  const newEmp={
    id:newId,cid,fn,ln,
    fan:document.getElementById('ne-fan').value,
    fin,
    bd:document.getElementById('ne-bd').value,
    gender:document.getElementById('ne-gender').value,
    status:'CANDIDATE',did:null,pid:null,hire:null,
    phone:document.getElementById('ne-phone').value,
    email:document.getElementById('ne-email').value,
    salary:null,photo_path:null,files:[],
    cv_file:tempCVFile,
    contract_file:null,
    probation_end_date:null,
    marital_status:'',children_count:0,military_service:'',military_rank:'',
    id_serial:'',id_number:'',id_issue_date:'',id_expiry_date:'',
    pension_number:'',tax_number:'',
    driver_license:false,driver_categories:[],driver_issue_date:'',driver_expiry_date:'',
    emergency_contact:{name:'',phone:'',relation:''},
    reg_address:'',fact_address:'',
    bank_name:'',bank_iban:'',bank_card:'',
    insurance_type:'',insurance_company:'',insurance_number:'',insurance_date:'',
    blood_group:'',chronic_diseases:'',allergies:'',disability:false,disability_percent:0,
    work_schedule:'Tam',work_location:'Ofis',manager_id:null,has_subordinates:false,is_reserve:false,
    industry_certificates:[]
  };
  DB.employees.push(newEmp);
  DB.lifecycle.push({eid:newId,uid:S.uid,old:null,new_s:'CANDIDATE',desc:'Namizəd profilsı yaradıldı',date:new Date().toISOString().split('T')[0]});
  logAudit(newId,'status',null,'CANDIDATE','Namizəd profilsı yaradıldı');
  tempCVFile=null;
  closeNewEmpModal();
  S.tab='CANDIDATE'; S.view='employees';
  renderAll();
  setTimeout(()=>openCard(newId),100);
}

function openEditCompanyModal(id){
  const c=DB.companies.find(x=>x.id===id);
  if(!c) return;

  const industryOptions=industries.map(i=>`<option value="${i.value}" ${i.value===c.industry?'selected':''}>${i.icon} ${i.label}</option>`).join('');
  
  // Get all companies except children of current company (to prevent circular reference)
  const getParentOptions = () => {
    const children = getChildren(c.id);
    const childIds = children.map(ch => ch.id);
    return DB.companies
      .filter(x => x.id !== c.id && !childIds.includes(x.id))
      .map(x => `<option value="${x.id}" ${x.id===c.parent_id?'selected':''}>${x.name} ${x.is_holding?'(Holding)':''}</option>`)
      .join('');
  };

  const html=`
    <div class="backdrop" id="editco-bd" onclick="if(event.target.id==='editco-bd')closeModal()">
      <div class="modal-box modal-md">
        <div class="mh"><div class="mh-title">✎ Şirkəti Redaktə</div><button class="mclose" onclick="closeModal()">×</button></div>
        <div class="mbody">
          <div class="fg"><label class="flbl">Şirkət ID</label><input class="finput" value="${c.id}" disabled></div>
          <div class="fg"><label class="flbl">Şirkət adı *</label><input class="finput" id="editco-name" value="${c.name}"></div>
          <div class="fg"><label class="flbl">VÖEN *</label><input class="finput" id="editco-tax" value="${c.tax_id}" maxlength="10"></div>
          <div class="fg"><label class="flbl">Sahə *</label><select class="fselect" id="editco-industry">${industryOptions}</select></div>
          <div class="fg"><label class="flbl">Ünvan</label><textarea class="ftextarea" id="editco-address">${c.address||''}</textarea></div>
          ${!c.is_holding?`<div class="fg"><label class="flbl">Ana şirkət</label><select class="fselect" id="editco-parent"><option value="">Holding (birbaşa)</option>${getParentOptions()}</select></div>`:''}
        </div>
        <div class="mfooter">
          ${!c.is_holding?`<button class="btn btn-ghost text-err" onclick="deleteCompany(${c.id})">🗑 Sil</button>`:''}
          <div style="flex:1"></div>
          <button class="btn btn-secondary" onclick="closeModal()">Ləğv et</button>
          <button class="btn btn-primary" onclick="doEditCompany(${c.id})">Yadda saxla</button>
        </div>
      </div>
    </div>`;
  document.getElementById('modals').innerHTML=html;
}

function doEditCompany(id){
  const c=DB.companies.find(x=>x.id===id);
  const name=document.getElementById('editco-name').value.trim();
  const tax=document.getElementById('editco-tax').value.trim();
  const industry=document.getElementById('editco-industry').value;
  const address=document.getElementById('editco-address').value.trim();
  
  if(!name||!tax){alert('Ad və VÖEN mütləqdir!');return;}
  if(tax.length!==10){alert('VÖEN 10 rəqəm olmalıdır!');return;}
  
  c.name=name;
  c.tax_id=tax;
  c.industry=industry;
  c.address=address;
  if(!c.is_holding){
    c.parent_id=document.getElementById('editco-parent').value?parseInt(document.getElementById('editco-parent').value):null;
  }
  
  closeModal();
  renderContent();
}

function deleteCompany(id){
  const c=DB.companies.find(x=>x.id===id);
  if(!c) return;
  if(c.is_holding){alert('Holding silinə bilməz!');return;}
  
  const children=getChildren(id);
  if(children.length>0){
    if(!confirm(`Bu şirkətin ${children.length} alt şirkəti var. Silməyə əminsiniz? Alt şirkətlər də silinəcək.`)){
      return;
    }
    // Delete children recursively
    children.forEach(child=>deleteCompany(child.id));
  }
  
  // Check for employees
  const emps=DB.employees.filter(e=>e.cid===id);
  if(emps.length>0){
    if(!confirm(`Bu şirkətə ${emps.length} işçi bağlıdır. Silməyə əminsiniz? İşçilər silinməyəcək, amma şirkətsiz qalacaq.`)){
      return;
    }
    emps.forEach(e=>{e.cid=null;e.did=null;e.pid=null;});
  }
  
  DB.companies=DB.companies.filter(x=>x.id!==id);
  closeModal();
  renderContent();
}

function doAddUserWithAuth(){
  const name=document.getElementById('u-name').value.trim();
  const email=document.getElementById('u-email').value.trim();
  const username=document.getElementById('u-username').value.trim();
  const password=document.getElementById('u-password').value.trim();
  const role=document.getElementById('u-role').value;
  const cid=role==='SUBSIDIARY_HR'?parseInt(document.getElementById('u-cid').value):null;
  
  if(!name||!email||!username||!password){alert('Bütün sahələri doldurun!');return;}
  
  // Check unique username
  if(DB.users.find(u=>u.username===username)){alert('Bu username artıq mövcuddur!');return;}
  
  DB.users.push({
    id:Math.max(...DB.users.map(u=>u.id))+1,
    role,
    name,
    email,
    username,
    password, // In real app, hash this!
    cid,
    is_active:true
  });
  
  // Mock email sending
  alert(`✅ İstifadəçi yaradıldı!\n\n📧 Email göndərildi:\n${email}\n\nUsername: ${username}\nPassword: ${password}`);
  
  closeModal(); renderAll();
